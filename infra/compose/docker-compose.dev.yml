services:
  # One-time dependency install for all workspace packages
  deps:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && pnpm install --frozen-lockfile --force"
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/backend/shared/node_modules
      - gateway_node_modules:/app/backend/gateway/node_modules
      - auth_node_modules:/app/backend/services/auth-service/node_modules
      - user_node_modules:/app/backend/services/user-service/node_modules
      - fitness_node_modules:/app/backend/services/fitness-service/node_modules
      - ai_node_modules:/app/backend/services/ai-service/node_modules
      - web_node_modules:/app/frontend/web/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"

  # ── Frontend (hot reload) ────────────────────────────────────────────────
  web:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && pnpm --filter @gym-coach/web dev --host 0.0.0.0 --port 5173"
    depends_on:
      deps:
        condition: service_completed_successfully
      api-gateway:
        condition: service_started
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - web_node_modules:/app/frontend/web/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_PROXY_TARGET: http://api-gateway:3000
      CHOKIDAR_USEPOLLING: "1"
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"
    ports:
      - "5173:5173"
    restart: unless-stopped

  # ── API Gateway (hot reload) ─────────────────────────────────────────────
  api-gateway:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && pnpm --filter @gym-coach/api-gateway dev"
    depends_on:
      deps:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      fitness-service:
        condition: service_started
      ai-service:
        condition: service_started
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/backend/shared/node_modules
      - gateway_node_modules:/app/backend/gateway/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      NODE_ENV: development
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3004
      FITNESS_SERVICE_URL: http://fitness-service:3002
      AI_SERVICE_URL: http://ai-service:3003
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      CORS_ORIGIN: http://localhost:5173
      CHOKIDAR_USEPOLLING: "1"
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"
    ports:
      - "3000:3000"
    restart: unless-stopped

  # ── Auth Service (hot reload) ────────────────────────────────────────────
  auth-service:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && apk add --no-cache openssl
      && pnpm --filter @gym-coach/auth-service db:generate
      && pnpm --filter @gym-coach/auth-service dev"
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/backend/shared/node_modules
      - auth_node_modules:/app/backend/services/auth-service/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-gymcoach}:${POSTGRES_PASSWORD:-gymcoach_password}@postgres:5432/${POSTGRES_DB:-gymcoach}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES:-10}
      OTP_RESEND_SECONDS: ${OTP_RESEND_SECONDS:-60}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      CHOKIDAR_USEPOLLING: "1"
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"
    ports:
      - "3001:3001"
    restart: unless-stopped

  # ── User Service (hot reload) ────────────────────────────────────────────
  user-service:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && apk add --no-cache openssl
      && pnpm --filter @gym-coach/user-service db:generate
      && pnpm --filter @gym-coach/user-service dev"
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/backend/shared/node_modules
      - user_node_modules:/app/backend/services/user-service/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-gymcoach}:${POSTGRES_PASSWORD:-gymcoach_password}@postgres:5432/${POSTGRES_DB:-gymcoach}
      CHOKIDAR_USEPOLLING: "1"
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"
    ports:
      - "3004:3004"
    restart: unless-stopped

  # ── Fitness Service (hot reload) ─────────────────────────────────────────
  fitness-service:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && apk add --no-cache openssl
      && pnpm --filter @gym-coach/fitness-service db:generate
      && pnpm --filter @gym-coach/fitness-service dev"
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/backend/shared/node_modules
      - fitness_node_modules:/app/backend/services/fitness-service/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-gymcoach}:${POSTGRES_PASSWORD:-gymcoach_password}@postgres:5432/${POSTGRES_DB:-gymcoach}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://auth-service:3001
      AI_SERVICE_URL: http://ai-service:3003
      CHOKIDAR_USEPOLLING: "1"
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"
    ports:
      - "3002:3002"
    restart: unless-stopped

  # ── AI Service (hot reload) ──────────────────────────────────────────────
  ai-service:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && apk add --no-cache openssl
      && pnpm --filter @gym-coach/ai-service db:generate
      && pnpm --filter @gym-coach/ai-service dev"
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/backend/shared/node_modules
      - ai_node_modules:/app/backend/services/ai-service/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-gymcoach}:${POSTGRES_PASSWORD:-gymcoach_password}@postgres:5432/${POSTGRES_DB:-gymcoach}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-llama3.2:3b}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      CHOKIDAR_USEPOLLING: "1"
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"
    ports:
      - "3003:3003"
    restart: unless-stopped

  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gymcoach-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gymcoach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gymcoach_password}
      POSTGRES_DB: ${POSTGRES_DB:-gymcoach}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymcoach"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gymcoach-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: gymcoach-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  root_node_modules:
  shared_node_modules:
  gateway_node_modules:
  auth_node_modules:
  user_node_modules:
  fitness_node_modules:
  ai_node_modules:
  web_node_modules:
  pnpm_store:

networks:
  default:
    name: gymcoach-network

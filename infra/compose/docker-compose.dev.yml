services:
  # ── Frontend ──────────────────────────────────────────────────────────────
  web:
    build:
      context: ../..          # repo root (so pnpm workspace files are accessible)
      dockerfile: frontend/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
        VITE_CHAT_WS_URL: http://localhost:3005
    container_name: gymcoach-web
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - default

  # ── API Gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../..          # repo root
      dockerfile: backend/gateway/Dockerfile
    container_name: gymcoach-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Corrected internal Docker service URLs and ports
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3004
      FITNESS_SERVICE_URL: http://fitness-service:3002
      AI_SERVICE_URL: http://ai-service:3003
      CHAT_SERVICE_URL: http://chat-service:3005
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      fitness-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Auth Service ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ../..
      dockerfile: backend/services/auth-service/Dockerfile
    container_name: gymcoach-auth
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-gymcoach}:${POSTGRES_PASSWORD:-gymcoach_password}@postgres:5432/${POSTGRES_DB:-gymcoach}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES:-10}
      OTP_RESEND_SECONDS: ${OTP_RESEND_SECONDS:-60}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── User Service ──────────────────────────────────────────────────────────
  user-service:
    build:
      context: ../..
      dockerfile: backend/services/user-service/Dockerfile
    container_name: gymcoach-user
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-gymcoach}:${POSTGRES_PASSWORD:-gymcoach_password}@postgres:5432/${POSTGRES_DB:-gymcoach}
      AUTH_SERVICE_URL: http://auth-service:3001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Fitness Service ───────────────────────────────────────────────────────
  fitness-service:
    build:
      context: ../..
      dockerfile: backend/services/fitness-service/Dockerfile
    container_name: gymcoach-fitness
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-gymcoach}:${POSTGRES_PASSWORD:-gymcoach_password}@postgres:5432/${POSTGRES_DB:-gymcoach}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── AI Service ────────────────────────────────────────────────────────────
  ai-service:
    build:
      context: ../..
      dockerfile: backend/services/ai-service/Dockerfile
    container_name: gymcoach-ai
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-gymcoach}:${POSTGRES_PASSWORD:-gymcoach_password}@postgres:5432/${POSTGRES_DB:-gymcoach}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Chat Service ─────────────────────────────────────────────────────────
  chat-service:
    build:
      context: ../..
      dockerfile: backend/services/chat-service/Dockerfile
    container_name: gymcoach-chat
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      CHAT_SERVICE_PORT: 3005
      CHAT_DATABASE_URL: postgresql://${POSTGRES_USER:-gymcoach}:${POSTGRES_PASSWORD:-gymcoach_password}@postgres:5432/gymcoach_chat
      DATABASE_URL: postgresql://${POSTGRES_USER:-gymcoach}:${POSTGRES_PASSWORD:-gymcoach_password}@postgres:5432/gymcoach_chat
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3004
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gymcoach-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gymcoach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gymcoach_password}
      POSTGRES_DB: ${POSTGRES_DB:-gymcoach}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymcoach"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gymcoach-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: gymcoach-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  default:
    name: gymcoach-network

services:
  deps:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && pnpm install --frozen-lockfile --force"
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/backend/shared/node_modules
      - gateway_node_modules:/app/backend/gateway/node_modules
      - auth_node_modules:/app/backend/services/auth-service/node_modules
      - user_node_modules:/app/backend/services/user-service/node_modules
      - fitness_node_modules:/app/backend/services/fitness-service/node_modules
      - ai_node_modules:/app/backend/services/ai-service/node_modules
      - web_node_modules:/app/frontend/web/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"

  web:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && pnpm --filter @gym-coach/web dev --host 0.0.0.0 --port 5174"
    depends_on:
      deps:
        condition: service_completed_successfully
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - web_node_modules:/app/frontend/web/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      VITE_API_URL: http://localhost:3000
      CHOKIDAR_USEPOLLING: "1"
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"
    ports:
      - "5174:5174"

  api-gateway:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && pnpm --filter @gym-coach/api-gateway dev"
    depends_on:
      deps:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      fitness-service:
        condition: service_started
      ai-service:
        condition: service_started
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/backend/shared/node_modules
      - gateway_node_modules:/app/backend/gateway/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      CHOKIDAR_USEPOLLING: "1"
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"
    healthcheck:
      disable: true

  auth-service:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && pnpm --filter @gym-coach/auth-service db:generate
      && pnpm --filter @gym-coach/auth-service dev"
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/backend/shared/node_modules
      - auth_node_modules:/app/backend/services/auth-service/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      CHOKIDAR_USEPOLLING: "1"
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"
    healthcheck:
      disable: true

  user-service:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && pnpm --filter @gym-coach/user-service db:generate
      && pnpm --filter @gym-coach/user-service dev"
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/backend/shared/node_modules
      - user_node_modules:/app/backend/services/user-service/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      CHOKIDAR_USEPOLLING: "1"
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"
    healthcheck:
      disable: true

  fitness-service:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && pnpm --filter @gym-coach/fitness-service db:generate
      && pnpm --filter @gym-coach/fitness-service dev"
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/backend/shared/node_modules
      - fitness_node_modules:/app/backend/services/fitness-service/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      CHOKIDAR_USEPOLLING: "1"
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"
    healthcheck:
      disable: true

  ai-service:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm@8.15.1
      && pnpm --filter @gym-coach/ai-service db:generate
      && pnpm --filter @gym-coach/ai-service dev"
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ../..:/app
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/backend/shared/node_modules
      - ai_node_modules:/app/backend/services/ai-service/node_modules
      - pnpm_store:/app/.pnpm-store
    environment:
      CHOKIDAR_USEPOLLING: "1"
      PNPM_STORE_DIR: /app/.pnpm-store
      CI: "1"
      PNPM_DISABLE_SELF_UPDATE_CHECK: "1"
    healthcheck:
      disable: true

volumes:
  root_node_modules:
  shared_node_modules:
  gateway_node_modules:
  auth_node_modules:
  user_node_modules:
  fitness_node_modules:
  ai_node_modules:
  web_node_modules:
  pnpm_store:
